name: Ticket Automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch tickets
        run: python ticket_fetch.py

      - name: Analyze tickets
        run: python ticket_analysis.py

      - name: Generate priorities
        run: python priority_generator.py
